<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>S.F.A | Simulador</title>

  <script src="./js/sessao.js"></script>

  <link rel="stylesheet" href="./css/estilo.css">
  <link rel="icon" href="./assets/icon/icon-site.png">
  <link rel="preconnect" href="https://fonts.gstatic.com">
</head>

<body>

  <!--header inicio-->
  <div class="header">
    <div class="container">
      <div class="logo">
        <h1 class="titulo">S.F.A</h1>
        <span class="subtitulo">SPORTS FINANCE ASSET</span>
      </div>
      <ul class="navbar">
        <li>
          <a href="index.html">Inicial</a>
        </li>
        <li class="agora">
          <a href="#">Simulador</a>
        </li>
        <li>
          <a href="sobre-nos.html">Sobre Nós</a>
        </li>
        <li>|</li>
        <li>
          <a href="login.html">Login</a>
        </li>
        <li>
          <a href="cadastro.html">Cadastro</a>
        </li>
      </ul>
    </div>
  </div>


  <!-- simulador inicio -->
  <div class="simulador">
    <div class="alerta_erro">
      <div class="card_erro" id="cardErro">
        <span id="mensagem_erro"></span>
      </div>
    </div>
    <div class="container simulador">
      <div class="card card-cadastro">
        <h2>Descubra a Eficiencia da Gestão</h2>
        <div class="formulario">
          <div class="campo">
            <span>Nome do clube</span>
            <input id="ipt_nome_clube" type="text" placeholder="Insira aqui o nome do clube" />
          </div>
          <div class="campo">
            <span>Receita estimada</span>
            <input id="ipt_receita" type="text" placeholder="Receita estimada" />
          </div>
          <div class="campo">
            <span>Divida estimada</span>
            <input id="ipt_divida" type="text" placeholder="Divida estimada" />
          </div>
          <div class="campo">
            <span>Investimento no elenco</span>
            <input id="ipt_investimento" type="number" placeholder="Investimento no elenco" />
          </div>
          <div class="campo">
            <span>Pontuação final do clube</span>
            <input id="ipt_pontuacao" type="number" placeholder="Pontuação final" />
          </div>
          <button class="botao" onclick="analisar()">Analisar</button>
        </div>
        <div id="div_aguardar" class="loading-div">
          <img src="./assets/circle-loading.gif" id="loading-gif" />
        </div>

        <div id="div_erros_login"></div>
      </div>
    </div>
  </div>
<!-- simulador fim -->



  <!--footer inicio-->
  <div class="footer">
    <div class="container">
      <h4>Feito por Jonas Fernandes &copy; 2026</h4>
      <span class="version">v1.0.0</span>
    </div>
  </div>
  <!--footer fim-->
</body>

</html>
