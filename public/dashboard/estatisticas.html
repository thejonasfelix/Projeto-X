        function mudarTemporada() {
            var anoSelecionado = document.getElementById('season-select').value;

            fetch(`/medidas/jordan/${anoSelecionado}`, { cache: 'no-store' }).then(function (response) {
                if (response.ok) {
                    response.json().then(function (resposta) {
                        console.log(`Dados recebidos: ${JSON.stringify(resposta)}`);
                        var dados = resposta[0];

                        document.getElementById('ppg-value').innerText = dados.pontos_mj;
                        document.getElementById('apg-value').innerText = dados.assistencias_mj;
                        document.getElementById('rpg-value').innerText = dados.rebotes_mj;
                        document.getElementById('fg-value').innerText = dados.aproveitamento_mj + "%";

                        plotarGrafico(dados);
                    });
                } else {
                    console.error('Nenhum dado encontrado ou erro na API');
                }
            })
                .catch(function (error) {
                    console.error(`Erro na obtenção dos dados p/ gráfico: ${error.message}`);
                });
        }

                graficoAtual.destroy();
            }

                type: 'bar',
                data: {

                        }
                    ]
                },
                options: {
                    responsive: true,
                    scales: {
                        y: {
                            beginAtZero: true
                        }
                    }
                }
            });
        }
